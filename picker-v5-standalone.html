<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天使茶歇 · 产品目录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F3EF;--dark:#2C2420;--text:#2C2420;--text2:#7A6B62;--border:#E4DDD5;--accent:#C4956A;--price:#B03A2E;--green:#27AE60;--hover:#FFFAF6}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.header{background:linear-gradient(135deg,#2C2420,#3D332C);color:#FFF;padding:16px 20px;position:sticky;top:0;z-index:100}
.hi{max-width:1400px;margin:0 auto}
.tr{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.logo{font-size:17px;font-weight:700}
.logo span{color:var(--accent)}
.ta{margin-left:auto;display:flex;gap:8px}
.btn{padding:7px 16px;border-radius:18px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-g{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:#FFF}
.btn-g:hover{background:rgba(255,255,255,.2)}
.btn-a{background:var(--accent);color:#FFF}
.sr{display:flex;gap:8px;align-items:center}
.sr input{flex:1;padding:7px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#FFF;font-size:13px;outline:none}
.sr input::placeholder{color:rgba(255,255,255,.4)}
.sr input:focus{border-color:var(--accent)}
.st{color:rgba(255,255,255,.5);font-size:11px;margin-top:8px}
.lay{max-width:1400px;margin:0 auto;padding:16px 20px 100px;display:flex;gap:16px}
.sb{width:185px;flex-shrink:0;position:sticky;top:90px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}
.stitle{font-size:11px;font-weight:700;color:var(--text2);padding:4px 8px 6px;letter-spacing:.5px}
.cb{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:2px;border:1.5px solid transparent}
.cb:hover{background:#EDE8E2;color:var(--text)}
.cb.active{background:#FFF3E8;color:var(--accent);border-color:#F0D9C0;font-weight:600}
.cb .ci{font-size:14px}
.cb .cn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb .cc{font-size:10px;background:#EDE8E2;padding:1px 6px;border-radius:10px;flex-shrink:0}
.cb.active .cc{background:#F0D9C0}
.cball{border:1.5px solid var(--border);background:#FFF;margin-bottom:6px}
.mn{flex:1;min-width:0}
.sb2{background:#FFF;border:1.5px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:14px;display:none;align-items:center;gap:16px;font-size:12px;color:var(--text2)}
.sb2.on{display:flex}
.sb2 strong{color:var(--price);font-size:18px}
.div{width:1px;height:18px;background:var(--border)}
.cs{margin-bottom:14px}
.ch{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#FFF;border:1.5px solid var(--border);border-radius:10px 10px 0 0;cursor:pointer;user-select:none}
.ch:hover{background:#FFFCF8}
.ch .chi{font-size:18px}
.ch .chn{font-size:14px;font-weight:700}
.ch .ccnt{font-size:11px;color:var(--text2);margin-left:auto}
.ch .ctgl{font-size:11px;color:var(--text2);transition:transform .2s}
.ch .ctgl.up{transform:rotate(180deg)}
.cbdy{background:#FFF;border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.cbdy.collapsed{display:none}
.tbl{display:grid;grid-template-columns:60px 1fr 80px 100px;gap:0}
.tbl-head>div{padding:7px 8px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);background:#FAFAF8}
.tr2>div{padding:8px;border-bottom:1px solid #F5F0EB;display:flex;align-items:center}
.tr2:last-child>div{border-bottom:none}
.tr2:hover>div{background:var(--hover)}
.tr2.sel>div{background:#FFF5EE}
.tr2.sel .pp{color:#B03A2E;font-weight:700}
.chk{justify-content:center}
.chk input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}




.pname{flex:1;min-width:0}
.pname-main{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pname-spec{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pname-tag{display:inline-block;font-size:9px;background:#FFF3E0;color:#E65100;padding:1px 5px;border-radius:3px;margin-bottom:2px}
.pname-mat{font-size:10px;color:#9E8E7E;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.punit{font-size:12px;color:var(--text2);justify-content:center}
.pp{font-size:14px;font-weight:700;color:var(--price);justify-content:flex-end;white-space:nowrap}
.pp small{font-size:10px;font-weight:400;color:var(--text2);margin-left:2px}
.pq{display:flex;align-items:center;gap:4px;justify-content:center}
.pq button{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:#FFF;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.pq button:hover{border-color:var(--accent);color:var(--accent)}
.pq input{width:38px;text-align:center;border:1px solid var(--border);border-radius:4px;font-size:12px;padding:2px 0;outline:none}
.pq input:focus{border-color:var(--accent)}
.cb2{position:fixed;bottom:0;left:0;right:0;background:#FFF;border-top:2px solid var(--border);padding:12px 24px;display:none;align-items:center;gap:16px;box-shadow:0 -4px 20px rgba(0,0,0,.1);z-index:100}
.cb2.on{display:flex}
.ci-l{font-size:12px;color:var(--text2)}
.ci-t{font-size:24px;font-weight:700;color:var(--price)}
.ci-c{font-size:11px;color:var(--text2)}
.ci-c strong{color:var(--price)}
.ca{margin-left:auto;display:flex;gap:8px}
.bc{background:#F0EBE6;color:var(--text2);padding:9px 18px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.bc:hover{background:#E4DDD5}
.be{background:var(--green);color:#FFF;padding:9px 20px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.be:hover{background:#1E8449}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mbx{background:#FFF;border-radius:16px;width:100%;max-width:420px;padding:28px 24px}
.mbx h3{font-size:17px;font-weight:700;margin-bottom:4px}
.mbx>p{font-size:12px;color:var(--text2);margin-bottom:16px}
.mdt{display:flex;gap:8px;margin-bottom:16px}
.mdt div{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:#FFF;font-size:13px;cursor:pointer;text-align:center;font-weight:600;color:var(--text2);transition:.2s}
.mdt div.on{border-color:var(--accent);background:#FFF8F2;color:var(--accent)}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.fr input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.fr input:focus{border-color:var(--accent)}
.ma{display:flex;gap:8px;margin-top:16px}
.ma button{flex:1;text-align:center;padding:10px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.mac{background:#F0EBE6;color:var(--text2)}
.mad{background:var(--price);color:#FFF}
.to{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(44,36,32,.88);color:#FFF;padding:10px 22px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.to.on{opacity:1}
.emp{text-align:center;padding:60px 20px;color:var(--text2)}
.emp .em{font-size:52px;margin-bottom:10px}
@media(max-width:700px){
.lay{flex-direction:column;padding:12px}
.sb{width:100%;position:static;max-height:none;display:flex;flex-wrap:wrap;gap:4px;padding:0}
.stitle{display:none}
.cb{display:inline-flex;padding:5px 10px;border-radius:14px;border:1.5px solid var(--border);background:#FFF;margin:2px}
.cb.active{border-color:var(--accent);background:#FFF3E8}
.tbl{grid-template-columns:48px 1fr 56px 64px}
.tbl-head>*:nth-child(5),.tr2>*:nth-child(5){display:none}

}
</style>
</head>
<body>
<div class="header">
  <div class="hi">
    <div class="tr">
      <div class="logo">🌸 天使茶歇 <span>· 产品目录</span></div>
      <div class="ta"><button class="btn btn-g" id="bct">🗑️ 清空</button></div>
    </div>
    <div class="sr">
      <input type="text" id="sri" placeholder="🔍 搜索产品名称、规格..." />
      <button class="btn btn-a" id="bet">📥 生成报价单</button>
    </div>
    <div class="st" id="str">加载中...</div>
  </div>
</div>
<div class="lay">
  <div class="sb">
    <div class="stitle">产品分类</div>
    <div class="cb cball active" id="cAll" data-cat="">
      <span class="ci">📦</span><span class="cn">全部产品</span><span class="cc" id="cntA">...</span>
    </div>
    <div id="cBtns"></div>
  </div>
  <div class="mn">
    <div class="sb2" id="stBar">
      <span>已选 <strong id="sN">0</strong> 款</span><div class="div"></div>
      <span>共 <span id="sC">0</span> 件</span><div class="div"></div>
      <span>合计 <strong id="sT">¥0.00</strong></span>
    </div>
    <div id="pList"><div class="emp"><div class="em">⏳</div><p>正在加载产品数据...</p></div></div>
  </div>
</div>
<div class="cb2" id="cbBar">
  <div>
    <div class="ci-l">已选 <strong id="cbN">0</strong> 款 · <span id="cbC">0</span> 件</div>
    <div class="ci-t">¥<span id="cbT">0.00</span></div>
    <div class="ci-c">按<strong>建议零售价</strong>计算</div>
  </div>
  <div class="ca">
    <button class="bc" id="bcl">清空</button>
    <button class="be" id="bex">📥 生成Excel报价</button>
  </div>
</div>
<div class="mo" id="mo">
  <div class="mbx">
    <h3>📥 生成报价单</h3>
    <p>简易模式：1张汇总表 &nbsp;|&nbsp; 完整模式：汇总 + 分类分页</p>
    <div class="mdt"><div class="on" id="tS">💰 简易模式</div><div id="tF">📋 完整模式</div></div>
    <div class="fr"><label>客户姓名 / 公司</label><input type="text" id="fnC" placeholder="请输入客户姓名或公司名称" /></div>
    <div class="fr"><label>活动日期</label><input type="text" id="fnD" placeholder="如：2026年4月15日" /></div>
    <div class="fr"><label>备注（选填）</label><input type="text" id="fnN" placeholder="如：40人下午茶活动" /></div>
    <div class="ma">
      <button class="mac" id="bca">取消</button>
      <button class="mad" id="bdl">下载 Excel</button>
    </div>
  </div>
</div>
<div class="to" id="to"></div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script>
(function(P, C) {
var S={}, cur='', sq='', em='simple';
var $=function(s){return document.querySelector(s);};
function fm(n){return n%1===0?String(n):n.toFixed(2);}
function ea(s){return String(s).replace(/"/g,'&quot;');}
function enid(s){return encodeURIComponent(s).replace(/%/g,'_');}
function fp(n){for(var i=0;i<P.length;i++)if(P[i].name===n)return P[i];return null;}
function init(){
  var wi=0;for(var i=0;i<P.length;i++)if(P[i].image)wi++;
  $('#str').textContent='共 '+P.length+' 款产品 · '+wi+'款有图片';
  $('#cntA').textContent=P.length;
  rCats();r();bE();
}
function rCats(){
  var h='';
  for(var i=0;i<C.length;i++){
    var c=C[i], n=0;
    for(var j=0;j<P.length;j++)if(P[j].category===c[0])n++;
    if(!n)continue;
    h+='<div class="cb" data-cat="'+ea(c[0])+'"><span class="ci">'+c[1]+'</span><span class="cn">'+c[2]+'</span><span class="cc">'+n+'</span></div>';
  }
  $('#cBtns').innerHTML=h;
}
function r(){
  var l=cur?P.filter(function(p){return p.category===cur;}):P;
  if(sq){
    var ql=sq.toLowerCase();
    l=l.filter(function(p){
      return p.name.toLowerCase().indexOf(ql)!==-1||
        (p.spec&&p.spec.toLowerCase().indexOf(ql)!==-1)||
        (p.material&&p.material.toLowerCase().indexOf(ql)!==-1);
    });
  }
  if(!l.length){
    $('#pList').innerHTML='<div class="emp"><div class="em">🔍</div><p>没有找到 "'+sq+'" 相关产品</p></div>';
    uC();return;
  }
  var bC={};
  for(var i=0;i<l.length;i++){
    var p=l[i];
    if(!bC[p.category])bC[p.category]=[];
    bC[p.category].push(p);
  }
  var o=[];for(var i=0;i<C.length;i++)o.push(C[i][0]);
  var ks=Object.keys(bC).sort(function(a,b){
    var ai=o.indexOf(a),bi=o.indexOf(b);
    return(ai===-1?999:ai)-(bi===-1?999:bi);
  });
  var h='';
  for(var ki=0;ki<ks.length;ki++){
    var cat=ks[ki], its=bC[cat];
    var ci=null;for(var i=0;i<C.length;i++)if(C[i][0]===cat){ci=C[i];break;}
    var ic=ci?ci[1]:'📂', lb=ci?ci[2]:cat, eid=enid(cat);
    h+='<div class="cs"><div class="ch" id="ch_'+eid+'"><span class="chi">'+ic+'</span><span class="chn">'+lb+'</span><span class="ccnt">'+its.length+' 款</span><span class="ctgl up" id="tg_'+eid+'">▼</span></div><div class="cbdy" id="bd_'+eid+'"><div class="tbl tbl-head"><div><input type="checkbox" id="ca_'+eid+'" /></div><div></div><div>产品名称 / 规格（主要原材料）</div><div>单位</div><div style="justify-content:flex-end">单价（元）</div><div style="justify-content:center">选择</div></div>';
    for(var pi=0;pi<its.length;pi++){
      var p=its[pi], sel=S[p.name], qty=sel?sel.qty:0, isS=!!sel;
      var tag=p.tag?'<span class="pname-tag">'+p.tag.replace(/\n/g,' ')+'</span>':'';
      var imgHtml=p.image?'<img src="./images/'+p.image+'" alt="" />':'<div class="noimg">📷</div>';
      var matHtml=p.material?'<div class="pname-mat">（'+p.material+'）</div>':'';
      h+='<div class="tbl tr2'+(isS?' sel':'')+'" data-n="'+ea(p.name)+'"><div class="chk"><input type="checkbox"'+(isS?' checked':'')+' data-action="ds" data-n="'+ea(p.name)+'" /></div><div class="pname">'+tag+'<div class="pname-main">'+p.name+'</div><div class="pname-spec">'+(p.spec||'标准规格')+'</div>'+matHtml+'</div><div class="punit">'+(p.unit||'份')+'</div><div class="pp">¥'+fm(p.sales_price)+' <small>/ '+(p.unit||'份')+'</small></div><div class="pq"><button data-action="cq" data-n="'+ea(p.name)+'" data-d="-1">−</button><input type="number" value="'+qty+'" min="0" data-action="sq" data-n="'+ea(p.name)+'" /><button data-action="cq" data-n="'+ea(p.name)+'" data-d="1">+</button></div></div>';
    }
    h+='</div></div>';
  }
  $('#pList').innerHTML=h;
  uCA();uC();bindList();
}
function tc(cat){
  var eid=enid(cat),bd=$('#bd_'+eid),tg=$('#tg_'+eid);
  if(!bd)return;
  bd.classList.toggle('collapsed');
  tg.classList.toggle('up');
}
function ds(n){
  if(S[n]){delete S[n];}
  else{
    var p=fp(n);if(!p)return;
    var dq=(p.unit==='人'||p.unit==='台')?1:10;
    S[n]={qty:dq,price:p.price,sales_price:p.sales_price,unit:p.unit||'份',spec:p.spec||'',material:p.material||'',category:p.category,name:p.name};
  }
  r();
}
function cq(n,d){
  var p=fp(n);if(!p)return;
  if(!S[n])S[n]={qty:0,price:p.price,sales_price:p.sales_price,unit:p.unit||'份',spec:p.spec||'',material:p.material||'',category:p.category,name:p.name};
  S[n].qty=Math.max(0,S[n].qty+d);
  if(S[n].qty===0)delete S[n];
  r();
}
function sq(n,v){
  var q=Math.max(0,parseInt(v)||0),p=fp(n);if(!p)return;
  if(q===0){delete S[n];}
  else{S[n]={qty:q,price:p.price,sales_price:p.sales_price,unit:p.unit||'份',spec:p.spec||'',material:p.material||'',category:p.category,name:p.name};}
  r();
}
function tca(cat,ck){
  var its=P.filter(function(p){return p.category===cat;});
  if(ck){for(var i=0;i<its.length;i++){var p=its[i];if(!S[p.name]){var dq=(p.unit==='人'||p.unit==='台')?1:10;S[p.name]={qty:dq,price:p.price,sales_price:p.sales_price,unit:p.unit||'份',spec:p.spec||'',material:p.material||'',category:p.category,name:p.name};}}}
  else{for(var i=0;i<its.length;i++){delete S[its[i].name];}}
  r();
}
function bindList(){
  $('#pList').addEventListener('click',function(e){
    var action=e.target.dataset.action;
    if(!action)return;
    var n=e.target.dataset.n;
    if(action==='ds')ds(n);
    else if(action==='cq')cq(n,parseInt(e.target.dataset.d)||0);
  });
  $('#pList').addEventListener('change',function(e){
    var action=e.target.dataset.action;
    if(action==='sq')sq(e.target.dataset.n,e.target.value);
  });
  $('#pList').addEventListener('input',function(e){
    var action=e.target.dataset.action;
    if(action==='sq')sq(e.target.dataset.n,e.target.value);
  });
  $$('.ch').forEach(function(el){
    el.addEventListener('click',function(){
      var id=el.id.replace('ch_','');
      var bd=$('#bd_'+id),tg=$('#tg_'+id);
      if(bd)bd.classList.toggle('collapsed');
      if(tg)tg.classList.toggle('up');
    });
  });
  $$('[id^="ca_"]').forEach(function(el){
    el.addEventListener('change',function(){
      var id=el.id.replace('ca_','');
      var cat=null;
      for(var i=0;i<C.length;i++){var eid=enid(C[i][0]);if(eid===id){cat=C[i][0];break;}}
      if(cat!==null)tca(cat,el.checked);
    });
  });
}
function scCat(cat){
  cur=cat||'';
  $$('.cb').forEach(function(el){el.classList.remove('active');});
  $$('.cb').forEach(function(el){if(el.dataset.cat===(cat||''))el.classList.add('active');});
  r();
  window.scrollTo({top:0,behavior:'smooth'});
}
function uCA(){
  for(var i=0;i<C.length;i++){
    var c=C[i],eid=enid(c[0]),cb=$('#ca_'+eid);
    if(!cb)continue;
    var its=P.filter(function(p){return p.category===c[0];});
    if(!its.length){cb.checked=false;continue;}
    var allS=its.every(function(p){return !!S[p.name];});
    var someS=its.some(function(p){return !!S[p.name];});
    cb.checked=allS;
    cb.indeterminate=someS&&!allS;
  }
}
function uC(){
  var es=Object.values(S),n=es.length,tot=0,ct=0;
  for(var i=0;i<es.length;i++){tot+=es[i].qty*es[i].sales_price;ct+=es[i].qty;}
  $('#cbBar').classList.toggle('on',n>0);
  $('#cbN').textContent=n;$('#cbC').textContent=ct;$('#cbT').textContent=tot.toFixed(2);
  $('#sN').textContent=n;$('#sC').textContent=ct;$('#sT').textContent='¥'+tot.toFixed(2);
  $('#stBar').classList.toggle('on',n>0);
}
function ca(){S={};r();sh('已清空全部');}
function sh(m){var t=$('#to');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2200);}
function sMo(){$('#mo').classList.add('on');}
function hMo(){$('#mo').classList.remove('on');}
function sEM(m){em=m;$('#tS').classList.toggle('on',m==='simple');$('#tF').classList.toggle('on',m==='full');}
function dlEx(){
  var es=Object.values(S);
  if(!es.length){sh('请先选择产品');return;}
